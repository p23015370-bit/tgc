<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Footer</title>
  <link rel="stylesheet" href="../css/footer.css">
</head>

<body>
  <footer class="cn-footer" role="contentinfo">
    <div class="cn-footer__wrap">
      <section class="cn-footer__col cn-footer__left">
        <h3 class="cn-footer__title">快速导航</h3>

        <nav class="cn-footer__nav" aria-label="快速导航">
          <a href="#">网站首页</a>
          <a href="#">关于我们</a>
          <a href="#">产品展示</a>
          <a href="#">服务和质量承诺</a>
          <a href="#">联系我们</a>
        </nav>

        <div class="cn-footer__meta">
          <p>Copyright © <span id="cnYear"></span> 通源塑胶工业（苏州）有限公司 All Rights Reserved.</p>
          <p>备案号：苏ICP备2023005864号-1</p>
        </div>
      </section>

      <section class="cn-footer__col cn-footer__mid">
        <h3 class="cn-footer__title">联系信息</h3>

        <ul class="cn-footer__list">
          <li class="cn-footer__item">
            <span class="cn-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 22s7-6.2 7-13a7 7 0 1 0-14 0c0 6.8 7 13 7 13z" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </span>
            <div>
              <div class="cn-footer__label">公司</div>
              <div class="cn-footer__value">通源塑胶工业（苏州）有限公司</div>
            </div>
          </li>

          <li class="cn-footer__item">
            <span class="cn-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M6.5 3.5l3 1.4c.7.3 1 1.1.7 1.8l-1 2.2c-.2.5-.1 1 .2 1.4l4.7 4.7c.4.4.9.5 1.4.2l2.2-1c.7-.3 1.5 0 1.8.7l1.4 3c.3.7 0 1.5-.7 1.8-1.4.7-3 .9-4.6.6-3.2-.6-6.8-3-9.6-5.8C4.2 12.8 1.8 9.2 1.2 6c-.3-1.6-.1-3.2.6-4.6.3-.7 1.1-1 1.8-.7z"
                      stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              </svg>
            </span>
            <div>
              <div class="cn-footer__label">联系方式</div>
              <div class="cn-footer__value">
                <a class="cn-footer__link phone-confirm" href="tel:+8613584259823">13584259823</a>
              </div>
            </div>
          </li>

          <li class="cn-footer__item">
            <span class="cn-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 21V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v17" stroke="currentColor" stroke-width="1.8"/>
                <path d="M8 6h3M8 9h3M8 12h3M8 15h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M20 21v-9a2 2 0 0 0-2-2h-1" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </span>
            <div>
              <div class="cn-footer__label">地址</div>
              <div class="cn-footer__value">中国江苏省苏州市吴江经济开发区九龙路99号</div>
            </div>
          </li>

          <li class="cn-footer__item">
            <span class="cn-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
                <path d="M3 12h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M12 3c2.5 2.6 4 5.9 4 9s-1.5 6.4-4 9c-2.5-2.6-4-5.9-4-9s1.5-6.4 4-9z"
                      stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </span>
            <div>
              <div class="cn-footer__label">网址</div>
              <div class="cn-footer__value">
                <a class="cn-footer__link" href="https://www.thongguan.cn" target="_blank" rel="noopener">www.thongguan.cn</a>
              </div>
            </div>
          </li>
        </ul>
      </section>

      <section class="cn-footer__col cn-footer__right">
        <div class="cn-qrbox">
          <img class="cn-qrbox__img" src="../img/qr.jpg" alt="二维码">
          <p class="cn-qrbox__text">扫码咨询 · 微信联系</p>
        </div>
      </section>
    </div>

    <div class="cn-footer__bottom">
      <span class="cn-footer__bottomline" aria-hidden="true"></span>
      <p class="cn-footer__small">欢迎来访 · 感谢阅读</p>
    </div>
  </footer>

  <script>
    document.getElementById("cnYear").textContent = new Date().getFullYear();

    (function () {
      var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);
      document.querySelectorAll('.phone-confirm').forEach(function (a) {
        a.addEventListener('click', function (e) {
          if (isTouch) return;
          if (!confirm('是否拨打此号码？')) e.preventDefault();
        });
      });
    })();
  </script>
</body>
</html>
