  <iframe
    id="footerFrame"

  <script>
    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type !== "setHeight") return;

      const iframe = document.getElementById(data.id);
      if (!iframe) return;

      const extra = (data.id === "navFrame") ? 12 : 0;
      iframe.style.height = (data.height + extra) + "px";
    });

    const revealEls = Array.from(document.querySelectorAll(".reveal"));
    const revealIO = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (!e.isIntersecting) return;

        e.target.classList.add("is-in");
        revealIO.unobserve(e.target);

        if (e.target.classList.contains("au-skillBlock")) {
          const bars = e.target.querySelectorAll(".bar");
          bars.forEach((bar, idx) => {
            const pct = Number(bar.getAttribute("data-pct") || 0);
            const fill = bar.querySelector("span");
            if (!fill) return;

            fill.style.transitionDelay = (idx * 120) + "ms";
            fill.style.width = Math.max(0, Math.min(100, pct)) + "%";
          });
        }
      });
    }, { threshold: 0.15 });

    revealEls.forEach((el, i) => {
      el.style.transitionDelay = Math.min(i * 45, 260) + "ms";
      revealIO.observe(el);
    });

    window.addEventListener("load", () => {
      const hero = document.querySelector(".reveal.hero");
      if (hero) hero.classList.add("is-in");
    });

    (function(){
      const charts = document.querySelectorAll('.au-barChart');
      if(!charts.length) return;

      function animate(chart){
        const items = Array.from(chart.querySelectorAll('.au-barItem'));
        const vals = items.map(i => Number(i.dataset.value || 0));
        const max = Math.max(...vals, 1);

        items.forEach((item, idx) => {
          const v = Number(item.dataset.value || 0);
          const span = item.querySelector('.au-bar > span');
          const box  = item.querySelector('.au-bar');
          if(!span || !box) return;

          const usable = Math.max(10, box.clientHeight - 22);
          const px = Math.round((v / max) * usable);

          span.style.transitionDelay = (idx * 120) + "ms";
          span.style.height = Math.max(6, px) + "px";
        });
      }

      const chartIO = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if(!e.isIntersecting) return;
          animate(e.target);
          chartIO.unobserve(e.target);
        });
      }, { threshold: 0.35 });

      charts.forEach(c => chartIO.observe(c));
    })();

    (function(){
      const el = document.getElementById('onlineConsult');
      if(!el) return;

      const LINK = "https://wa.me/60123456789";

      try{
        const saved = JSON.parse(localStorage.getItem('oc_pos') || 'null');
        if(saved && typeof saved.x === 'number' && typeof saved.y === 'number'){
          el.style.left = saved.x + 'px';
          el.style.top  = saved.y + 'px';
          el.style.right = 'auto';
          el.style.bottom = 'auto';
        }
      }catch(e){}

      let startX=0, startY=0, startLeft=0, startTop=0;
      let dragging=false, moved=false;

      function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

      function pointerDown(e){
        dragging = true;
        moved = false;
        el.setPointerCapture(e.pointerId);

        const rect = el.getBoundingClientRect();
        startX = e.clientX;
        startY = e.clientY;
        startLeft = rect.left;
        startTop  = rect.top;

        el.style.left = rect.left + 'px';
        el.style.top  = rect.top  + 'px';
        el.style.right = 'auto';
        el.style.bottom = 'auto';
      }

      function pointerMove(e){
        if(!dragging) return;

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        if(Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;

        const w = el.offsetWidth;
        const h = el.offsetHeight;
        const maxX = window.innerWidth  - w - 6;
        const maxY = window.innerHeight - h - 6;

        const nextLeft = clamp(startLeft + dx, 6, maxX);
        const nextTop  = clamp(startTop  + dy, 6, maxY);

        el.style.left = nextLeft + 'px';
        el.style.top  = nextTop  + 'px';
      }

      function pointerUp(){
        if(!dragging) return;
        dragging = false;

        const left = parseFloat(el.style.left) || 0;
        const top  = parseFloat(el.style.top)  || 0;
        try{
          localStorage.setItem('oc_pos', JSON.stringify({x:left, y:top}));
        }catch(err){}

        if(!moved){
          window.open(LINK, "_blank", "noopener");
        }
      }

      el.addEventListener('pointerdown', pointerDown);
      el.addEventListener('pointermove', pointerMove);
      el.addEventListener('pointerup', pointerUp);
      el.addEventListener('pointercancel', pointerUp);

      window.addEventListener('resize', ()=>{
        const rect = el.getBoundingClientRect();
        const w = el.offsetWidth, h = el.offsetHeight;
        const maxX = window.innerWidth  - w - 6;
        const maxY = window.innerHeight - h - 6;
        const x = clamp(rect.left, 6, maxX);
        const y = clamp(rect.top , 6, maxY);
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
        el.style.right = 'auto';
        el.style.bottom = 'auto';
        try{ localStorage.setItem('oc_pos', JSON.stringify({x, y})); }catch(e){}
      });
    })();
  </script>
</body>
