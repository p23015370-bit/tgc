    <iframe
      id="footerFrame"
      class="embed embed-footer"
      src="components/footer.html"
      title="Footer"
      scrolling="no"
    ></iframe>

    <script>
      
      (function () {
        const EXTRA_PADDING = 8;
        const MIN_NAV_H = 90;
        const MIN_FOOTER_H = 220;

        const navFrame = document.getElementById("navFrame");
        const footerFrame = document.getElementById("footerFrame");
        const allowedOrigins = new Set([window.location.origin]);

        function setIFrameHeight(frame, h) {
          if (!frame) return;
          const minH = frame.id === "navFrame" ? MIN_NAV_H : MIN_FOOTER_H;
          const next = Math.max(minH, Number(h || 0) + EXTRA_PADDING);
          frame.style.height = next + "px";
        }

        window.addEventListener("message", (event) => {
          if (!allowedOrigins.has(event.origin)) return;
          const data = event.data;
          if (!data || typeof data !== "object") return;

          const id = data.id;
          const height = data.height;
          if (!id || typeof height !== "number") return;

          if (id === "navFrame") setIFrameHeight(navFrame, height);
          if (id === "footerFrame") setIFrameHeight(footerFrame, height);
        });

        function requestHeight(frame) {
          if (!frame || !frame.contentWindow) return;
          try {
            frame.contentWindow.postMessage(
              { type: "getHeight", id: frame.id },
              window.location.origin,
            );
          } catch (e) {}
        }

        navFrame &&
          navFrame.addEventListener("load", () => requestHeight(navFrame));
        footerFrame &&
          footerFrame.addEventListener("load", () =>
            requestHeight(footerFrame),
          );
      })();

      
      document.addEventListener("DOMContentLoaded", () => {
        (function () {
          const el = document.getElementById("onlineConsult");
          if (!el) return;

          const LINK = "https://wa.me/60123456789";

          try {
            const saved = JSON.parse(localStorage.getItem("oc_pos") || "null");
            if (
              saved &&
              typeof saved.x === "number" &&
              typeof saved.y === "number"
            ) {
              el.style.left = saved.x + "px";
              el.style.top = saved.y + "px";
              el.style.right = "auto";
              el.style.bottom = "auto";
            }
          } catch (e) {}

          let startX = 0,
            startY = 0,
            startLeft = 0,
            startTop = 0;
          let dragging = false,
            moved = false;

          function clamp(v, min, max) {
            return Math.max(min, Math.min(max, v));
          }

          function pointerDown(e) {
            dragging = true;
            moved = false;
            el.setPointerCapture(e.pointerId);

            const rect = el.getBoundingClientRect();
            startX = e.clientX;
            startY = e.clientY;
            startLeft = rect.left;
            startTop = rect.top;

            el.style.left = rect.left + "px";
            el.style.top = rect.top + "px";
            el.style.right = "auto";
            el.style.bottom = "auto";
          }

          function pointerMove(e) {
            if (!dragging) return;

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;

            const w = el.offsetWidth;
            const h = el.offsetHeight;
            const maxX = window.innerWidth - w - 6;
            const maxY = window.innerHeight - h - 6;

            el.style.left = clamp(startLeft + dx, 6, maxX) + "px";
            el.style.top = clamp(startTop + dy, 6, maxY) + "px";
          }

          function pointerUp() {
            if (!dragging) return;
            dragging = false;

            try {
              const rect = el.getBoundingClientRect();
              localStorage.setItem(
                "oc_pos",
                JSON.stringify({ x: rect.left, y: rect.top }),
              );
            } catch (e) {}
          }

          el.addEventListener("pointerdown", pointerDown);
          el.addEventListener("pointermove", pointerMove);
          el.addEventListener("pointerup", pointerUp);
          el.addEventListener("pointercancel", pointerUp);

          el.addEventListener("click", () => {
            if (moved) return;
            window.open(LINK, "_blank", "noopener");
          });
        })();
      });

      
      (function () {
        const items = Array.from(document.querySelectorAll(".reveal"));
        if (!items.length) return;

        if (!("IntersectionObserver" in window)) {
          items.forEach((el) => el.classList.add("is-in"));
          return;
        }

        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("is-in");
                io.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.12, rootMargin: "0px 0px -10% 0px" },
        );

        items.forEach((el) => io.observe(el));
      })();
    </script>
  </body>
</html>
