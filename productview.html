<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Product View</title>
    <link rel="stylesheet" href="css/productview.css" />
    <link rel="stylesheet" href="css/homepage.css" />
  </head>

  <body>
    <div
      id="onlineConsult"
      class="onlineConsult"
      role="button"
      aria-label="在线咨询"
    >
      <div class="ocTop">
        <img class="ocAvatar" src="img/kefu.jpg" alt="客服" />
      </div>
      <div class="ocBottom">
        <span>在线</span>
        <span>咨询</span>
      </div>
    </div>

    <iframe
      id="navFrame"
      class="embed embed-nav"
      src="components/navigation.html"
      title="Navigation"
      scrolling="no"
    ></iframe>

    <header class="pvHero">
      <div class="wrap">
        <h1 class="pvTitle">产品展示</h1>
        <div class="sectionDivider"></div>

        <div class="pvToolbar" aria-label="Product filters">
          <label class="pvLabel" for="categorySelect">类别</label>

          <select
            id="categorySelect"
            class="pvSelect"
            aria-label="Select category"
          >
            <option value="all">全部</option>
            <option value="option1">手用PE膜</option>
            <option value="option2">机用PE膜</option>
          </select>
        </div>
      </div>
    </header>

    <main class="pvMain">
      <div class="wrap">
        <section class="pvSection" aria-label="Product list">
          <div id="productGrid" class="pvGrid"></div>
          <p id="emptyTip" class="emptyTip" hidden>
            没有找到相关产品，请换关键词或分类试试
          </p>
        </section>
      </div>
    </main>

    <iframe
      id="footerFrame"
      class="embed embed-footer"
      src="components/footer.html"
      title="Footer"
      scrolling="no"
    ></iframe>

    <script>
      (function () {
        const EXTRA_PADDING = 8;
        const MIN_NAV_H = 90;
        const MIN_FOOTER_H = 220;

        const navFrame = document.getElementById("navFrame");
        const footerFrame = document.getElementById("footerFrame");
        const allowedOrigins = new Set([window.location.origin]);

        function setIFrameHeight(frame, h) {
          if (!frame) return;
          const minH = frame.id === "navFrame" ? MIN_NAV_H : MIN_FOOTER_H;
          const next = Math.max(minH, Number(h || 0) + EXTRA_PADDING);
          frame.style.height = next + "px";
        }

        window.addEventListener("message", (event) => {
          if (!allowedOrigins.has(event.origin)) return;

          const data = event.data;
          if (!data || typeof data !== "object") return;

          const id = data.id;
          const height = data.height;

          if (!id || typeof height !== "number") return;

          if (id === "navFrame") setIFrameHeight(navFrame, height);
          if (id === "footerFrame") setIFrameHeight(footerFrame, height);
        });

        function requestHeight(frame) {
          if (!frame || !frame.contentWindow) return;
          try {
            frame.contentWindow.postMessage(
              { type: "getHeight", id: frame.id },
              window.location.origin,
            );
          } catch (e) {}
        }

        navFrame &&
          navFrame.addEventListener("load", () => requestHeight(navFrame));
        footerFrame &&
          footerFrame.addEventListener("load", () =>
            requestHeight(footerFrame),
          );
      })();

      document.addEventListener("DOMContentLoaded", () => {
        const categorySelect = document.getElementById("categorySelect");
        const productGrid = document.getElementById("productGrid");
        const emptyTip = document.getElementById("emptyTip");

        const products = [
          {
            id: 1,
            name: "NEXT手用膜",
            category: "option1",
            img: "img/NEXT.png",
            desc: "适合日常托盘打包，操作轻松，稳定缠绕。",
            tags: ["轻量", "日常"],
          },
          {
            id: 2,
            name: "Max Stretch Stealth",
            category: "option1",
            img: "img/Max Stretch Stealth.png",
            desc: "减少耗材浪费，更省空间，更环保。",
            tags: ["环保", "省空间"],
          },
          {
            id: 3,
            name: "Prime TG Stretch",
            category: "option1",
            img: "img/primetgstretch.png",
            desc: "抗穿刺表现更好，适合尖角/重货。",
            tags: ["抗穿刺", "重货"],
          },
        ];

        function escapeHtml(str) {
          return String(str)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        }

        function normalize(s) {
          return String(s || "")
            .toLowerCase()
            .trim();
        }

        function filterByCategory(cat) {
          if (cat === "all") return products;
          return products.filter((p) => p.category === cat);
        }

        let currentKeyword = "";
        (function () {
          const params = new URLSearchParams(window.location.search);
          currentKeyword = (params.get("q") || "").trim();
        })();

        function filterByKeyword(list, keyword) {
          const k = normalize(keyword);
          if (!k) return list;

          const keys = k.split(/\s+/).filter(Boolean);
          return list.filter((p) => {
            const hay = normalize(
              [p.name, p.desc, (p.tags || []).join(" "), p.category].join(" "),
            );
            return keys.every((word) => hay.includes(word));
          });
        }

        function goToDetails(productId) {
          window.location.href = `productdetails.html?id=${encodeURIComponent(productId)}`;
        }

        function render(list) {
          productGrid.innerHTML = "";

          if (!list.length) {
            emptyTip.hidden = false;
            return;
          }
          emptyTip.hidden = true;

          const frag = document.createDocumentFragment();

          list.forEach((p, index) => {
            const card = document.createElement("article");
            card.className = "pvCard";
            card.setAttribute("data-category", p.category);
            card.setAttribute("tabindex", "0");
            card.setAttribute("role", "button");
            card.setAttribute("aria-label", `查看产品：${p.name}`);
            card.style.cursor = "pointer";

            card.addEventListener("click", () => goToDetails(p.id));
            card.addEventListener("keydown", (e) => {
              if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                goToDetails(p.id);
              }
            });

            const tagsHtml = (p.tags || [])
              .slice(0, 3)
              .map((t) => `<span class="badge">${escapeHtml(t)}</span>`)
              .join("");

            const imgHtml = p.img
              ? `<img class="pvImg" src="${p.img}" alt="${escapeHtml(p.name)}">`
              : `<div class="pvPlaceholder" aria-hidden="true"></div>`;

            card.innerHTML = `
              <div class="pvImgBox">
                ${imgHtml}
              </div>
              <div class="pvCardBody">
                <h3 class="pvName">${escapeHtml(p.name)}</h3>
                <p class="pvDesc">${escapeHtml(p.desc)}</p>
                <div class="pvMeta">
                  <span class="badge">分类：${escapeHtml(p.category)}</span>
                  ${tagsHtml}
                </div>
              </div>
            `;

            frag.appendChild(card);

            requestAnimationFrame(() => {
              setTimeout(() => card.classList.add("show"), index * 80);
            });
          });

          productGrid.appendChild(frag);
        }

        function applyFilters() {
          const cat = categorySelect.value;
          const list = filterByKeyword(filterByCategory(cat), currentKeyword);
          render(list);
        }

        applyFilters();
        categorySelect.addEventListener("change", applyFilters);

        (function () {
          const el = document.getElementById("onlineConsult");
          if (!el) return;

          const LINK = "https://wa.me/60123456789";

          try {
            const saved = JSON.parse(localStorage.getItem("oc_pos") || "null");
            if (
              saved &&
              typeof saved.x === "number" &&
              typeof saved.y === "number"
            ) {
              el.style.left = saved.x + "px";
              el.style.top = saved.y + "px";
              el.style.right = "auto";
              el.style.bottom = "auto";
            }
          } catch (e) {}

          let startX = 0,
            startY = 0,
            startLeft = 0,
            startTop = 0;
          let dragging = false,
            moved = false;

          function clamp(v, min, max) {
            return Math.max(min, Math.min(max, v));
          }

          function pointerDown(e) {
            dragging = true;
            moved = false;
            el.setPointerCapture(e.pointerId);

            const rect = el.getBoundingClientRect();
            startX = e.clientX;
            startY = e.clientY;
            startLeft = rect.left;
            startTop = rect.top;

            el.style.left = rect.left + "px";
            el.style.top = rect.top + "px";
            el.style.right = "auto";
            el.style.bottom = "auto";
          }

          function pointerMove(e) {
            if (!dragging) return;

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;

            const w = el.offsetWidth;
            const h = el.offsetHeight;
            const maxX = window.innerWidth - w - 6;
            const maxY = window.innerHeight - h - 6;

            const nextLeft = clamp(startLeft + dx, 6, maxX);
            const nextTop = clamp(startTop + dy, 6, maxY);

            el.style.left = nextLeft + "px";
            el.style.top = nextTop + "px";
          }

          function pointerUp() {
            if (!dragging) return;
            dragging = false;

            const left = parseFloat(el.style.left) || 0;
            const top = parseFloat(el.style.top) || 0;
            try {
              localStorage.setItem(
                "oc_pos",
                JSON.stringify({ x: left, y: top }),
              );
            } catch (err) {}

            if (!moved) {
              window.open(LINK, "_blank", "noopener");
            }
          }

          el.addEventListener("pointerdown", pointerDown);
          el.addEventListener("pointermove", pointerMove);
          el.addEventListener("pointerup", pointerUp);
          el.addEventListener("pointercancel", pointerUp);

          window.addEventListener("resize", () => {
            const rect = el.getBoundingClientRect();
            const w = el.offsetWidth,
              h = el.offsetHeight;
            const maxX = window.innerWidth - w - 6;
            const maxY = window.innerHeight - h - 6;
            const x = clamp(rect.left, 6, maxX);
            const y = clamp(rect.top, 6, maxY);
            el.style.left = x + "px";
            el.style.top = y + "px";
            el.style.right = "auto";
            el.style.bottom = "auto";
            try {
              localStorage.setItem("oc_pos", JSON.stringify({ x, y }));
            } catch (e) {}
          });
        })();
      });
    </script>
  </body>
</html>
